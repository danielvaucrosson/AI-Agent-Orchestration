name: Agent Worker
run-name: "Agent Worker: ${{ inputs.issue_id }} — ${{ inputs.issue_title }}"

on:
  workflow_dispatch:
    inputs:
      issue_id:
        description: "Linear issue ID (e.g., DVA-19)"
        required: true
        type: string
      issue_title:
        description: "Issue title for logs"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agent-worker-${{ inputs.issue_id }}
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: self-hosted
    timeout-minutes: 180
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_WITH_WORKFLOW }}

      - name: Install dependencies
        run: npm ci

      - name: Run agent
        id: agent
        run: |
          echo "start_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          claude -p "Pick up ${{ inputs.issue_id }}: ${{ inputs.issue_title }}. Follow the workflow protocol in CLAUDE.md. This is an automated scheduled run." --dangerously-skip-permissions
          echo "end_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge PR
        if: success() && vars.AGENT_AUTO_MERGE == 'true'
        run: |
          # Find the PR created by the agent for this issue
          PR_URL=$(gh pr list --head "feature/${{ inputs.issue_id }}" --json url --jq '.[0].url' 2>/dev/null || true)
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr list --head "fix/${{ inputs.issue_id }}" --json url --jq '.[0].url' 2>/dev/null || true)
          fi
          if [ -n "$PR_URL" ]; then
            echo "Found PR: $PR_URL"
            gh pr merge "$PR_URL" --squash --delete-branch || echo "Warning: auto-merge failed"
          else
            echo "No PR found for ${{ inputs.issue_id }} — skipping auto-merge"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_WITH_WORKFLOW }}

      - name: Job summary (success)
        if: success()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Agent Run Complete

          | Field | Value |
          |-------|-------|
          | Issue | ${{ inputs.issue_id }}: ${{ inputs.issue_title }} |
          | Linear | https://linear.app/dvaucrosson/issue/${{ inputs.issue_id }} |
          | Started | ${{ steps.agent.outputs.start_time }} |
          | Finished | ${{ steps.agent.outputs.end_time }} |
          | Outcome | Success |
          EOF

      - name: Handle failure
        if: failure()
        run: |
          # Check for handoff file
          HANDOFF_FILE=".claude/handoffs/${{ inputs.issue_id }}.md"
          HANDOFF_MSG=""
          if [ -f "$HANDOFF_FILE" ]; then
            HANDOFF_MSG="Handoff file exists at \`$HANDOFF_FILE\`"
          else
            HANDOFF_MSG="No handoff file found"
          fi

          # Move issue back to Todo
          node scripts/linear.mjs status "${{ inputs.issue_id }}" "Todo" || echo "Warning: Could not update Linear status"

          # Read existing retry count, apply label, and post comment
          # Uses agent-scheduler.mjs handle-failure command to reuse tested logic
          # Capture stdout to get the retry count for the summary
          FAILURE_OUTPUT=$(node scripts/agent-scheduler.mjs handle-failure "${{ inputs.issue_id }}" "$HANDOFF_MSG" 2>&1 || echo "Warning: failure handling incomplete")
          echo "$FAILURE_OUTPUT"

          # Write failure summary
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Agent Run Failed

          | Field | Value |
          |-------|-------|
          | Issue | ${{ inputs.issue_id }}: ${{ inputs.issue_title }} |
          | Linear | https://linear.app/dvaucrosson/issue/${{ inputs.issue_id }} |
          | Outcome | Failed |
          | Handoff | ${HANDOFF_MSG} |
          | Details | See Linear comment for retry count |
          EOF
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
