name: Create GitHub Issue

on:
  push:
    paths:
      - ".github/issue-requests/*.json"

permissions:
  issues: write
  contents: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Process issue requests
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = '.github/issue-requests';

            if (!fs.existsSync(dir)) {
              console.log('No issue-requests directory found');
              return;
            }

            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));
            if (files.length === 0) {
              console.log('No issue request files found');
              return;
            }

            const created = [];
            for (const file of files) {
              const filePath = path.join(dir, file);
              const content = JSON.parse(fs.readFileSync(filePath, 'utf8'));

              const labels = (content.labels || []).filter(Boolean);

              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: content.title,
                body: content.body || '',
                ...(labels.length > 0 && { labels }),
              });

              console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
              created.push({ file, number: issue.data.number, url: issue.data.html_url });
            }

            // Write summary
            let summary = '### Issues Created\n\n';
            for (const c of created) {
              summary += `- **#${c.number}** — [${c.url}](${c.url})\n`;
            }
            require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);

      - name: Clean up processed requests
        run: |
          if [ -d .github/issue-requests ] && [ "$(ls -A .github/issue-requests/*.json 2>/dev/null)" ]; then
            rm .github/issue-requests/*.json
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/issue-requests/
            git commit -m "Clean up processed issue requests"
            git push
          fi
