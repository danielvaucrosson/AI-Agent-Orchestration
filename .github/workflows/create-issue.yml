name: Create GitHub Issue

on:
  push:
    paths:
      - ".github/issue-requests/*.json"

permissions:
  issues: write
  contents: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Process issue requests
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: node scripts/create-issues-from-requests.mjs

      - name: Clean up processed requests
        run: |
          if [ -d .github/issue-requests ] && [ "$(ls -A .github/issue-requests/*.json 2>/dev/null)" ]; then
            rm .github/issue-requests/*.json
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/issue-requests/
            git commit -m "Clean up processed issue requests"
            git push
          fi
